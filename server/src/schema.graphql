type Me {
  id: ID!
  username: String!
  admin: Boolean!
}

type CheckMeResponse {
  ok: Boolean!
  error: String
  user: Me
}

type Query {
  CheckMe: CheckMeResponse!
  ListItems(cursor: ID, name: String, divide: String, native: String): ListItemsResponse!
  ReadItem(id: ID!): ReadItemResponse!
  hello: String!
}

type LoginUserResponse {
  ok: Boolean!
  error: String
  token: String
}

type Mutation {
  LoginUser(username: String!, password: String!): LoginUserResponse!
  LogoutUser: LogoutUserResponse!
  RegisterUser(username: String!, password: String!): RegisterUserResponse!
  AddItem(name: String!, divide: String!, native: String!, unit: String!, price: Int!): AddItemResponse!
  RemoveItem(id: ID!): RemoveItemResponse!
  UpdateItem(id: ID!, name: String, divide: String, native: String, unit: String, price: String): UpdateItemResponse!
}

type LogoutUserResponse {
  ok: Boolean!
  error: String
}

type RegisterUserResponse {
  ok: Boolean!
  error: String
}

type AddItemResponse {
  ok: Boolean!
  error: String
}

type ListItemsResponse {
  ok: Boolean!
  error: String
  items: [Item]
}

type ReadItemResponse {
  ok: Boolean!
  error: String
  item: Item
}

type RemoveItemResponse {
  ok: Boolean!
  error: String
}

type UpdateItemResponse {
  ok: Boolean!
  error: String
}

type Bill {
  id: ID!
  title: String!
  hall: String!
  etc: String!
  total_amount: Int!
  items: [InputItem]
  reserve: Int
  username: String!
  user_id: String!
  cart_id: String!
  created_at: Date!
}

type InputItem {
  id: ID!
  name: String!
  divide: String!
  native: String!
  unit: String!
  price: Int!
  count: Int!
  amount: Int!
}

type Cart {
  id: ID!
  user_id: String!
  bill_id: String
  completed: Boolean!
  deleted: Boolean!
  items: [InputItem]
}

type Item {
  id: ID!
  num: Int!
  name: String!
  divide: String!
  native: String!
  unit: String!
  price: Int!
  created_at: Date!
  updated_at: Date
}

scalar Date

type User {
  id: ID!
  username: String!
  password: String!
  admin: Boolean!
  token_version: Int!
  created_at: Date!
  updated_at: Date
}

